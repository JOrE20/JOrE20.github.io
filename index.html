<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOrE20</title>
  <link rel="stylesheet" href="style.css">
  <style>
    /* ---- CARD CONTAINER ---- */
    .card {
      background: #ffffff;
      border-radius: 8px;
      padding: 40px 35px;
      max-width: 500px;
      width: 100%;
      border: 1px solid #d0d4dc;
      text-align: center;
    }

    /* ---- PROFILE PICTURE ---- */
    .avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: #b0b8c5;
      margin: 0 auto 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      color: #2c3e50;
      font-weight: 600;
      border: 2px solid #a0a8b5;
    }

    .subtitle {
      color: #4a5568;
      font-size: 15px;
      margin-bottom: 24px;
      font-weight: 400;
    }

    /* ---- DIVIDER ---- */
    .divider {
      width: 40px;
      height: 2px;
      background: #b0b8c5;
      margin: 0 auto 22px;
      border-radius: 2px;
    }

    /* ---- LINKS SECTION ---- */
    .links {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: #f2f4f8;
      color: #1e2a3a;
      text-decoration: none;
      padding: 14px 18px;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 500;
      border: 1px solid #d0d4dc;
      transition: none;
    }

    .link-item:hover {
      background: #e8ebf0;
      border-color: #b0b8c5;
    }

    /* ---- ICON EMOJI ---- */
    .link-icon {
      font-size: 20px;
      line-height: 1;
    }

    /* ---- SOCIAL ROW ---- */
    .social-row {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .social-link {
      color: #3a4a5e;
      text-decoration: none;
      font-size: 14px;
      padding: 4px 10px;
      border-radius: 4px;
      background: #f2f4f8;
      border: 1px solid #d0d4dc;
    }

    .social-link:hover {
      background: #e8ebf0;
      color: #1e2a3a;
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
      .card {
        padding: 28px 18px;
      }
      h1 {
        font-size: 22px;
      }
      .link-item {
        font-size: 15px;
        padding: 12px 14px;
      }
      .avatar {
        width: 140px;
        height: 140px;
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <div class="card">

    <img src="https://github.com/JOrE20.png" alt="JOrE20" class="avatar" />
    <br />

    <h1>JOrE20</h1>
    <p class="subtitle">Developer &amp; Creator</p>

    <div class="divider"></div>

    <div class="links">
      <a href="pcg/generator.html" class="link-item">🧑‍💻 Procedural Code Generator</a>
    </div>

    <div class="social-row">
      <a href="mailto:joresoftwares@gmail.com" class="social-link">✉ Email</a>
      <a href="https://github.com/JOrE20" class="social-link">GitHub</a>
      <a href="https://perchance.org/jore" class="social-link">🎲 Perchance</a>
    </div>

    <p style="color: #8a9aa8; font-size: 13px; margin-top: 24px; letter-spacing: 0.2px;" id=copyright>
      © ???? · JOrE20
    </p>

  </div>
</body>
<script>
    let updateCopyright = () => document.getElementById("copyright").textContent = `© ${new Date().getFullYear()} · JOrE20`;
    updateCopyright();
    setInterval(updateCopyright, 1000);
</script>
</html>
